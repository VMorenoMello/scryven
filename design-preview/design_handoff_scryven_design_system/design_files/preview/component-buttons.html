<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    height: 32px; padding: 0 14px;
    border-radius: 8px;
    font-family: Inter, sans-serif;
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 150ms cubic-bezier(0.2, 0, 0.2, 1);
  }
  .btn-primary { background: #4A8A4A; color: #FAF9F7; }
  .btn-primary:hover { background: #3A6E3A; }
  .btn-secondary { background: #FFFFFF; color: #1F1D1A; border-color: #E8E5DF; }
  .btn-secondary:hover { background: #F2F0EC; border-color: #B8A882; }
  .btn-ghost { background: transparent; color: #4A463F; }
  .btn-ghost:hover { background: #F2F0EC; }
  .btn-danger { background: transparent; color: #6B1F10; border-color: #C4503A; }
  .btn-danger:hover { background: #FBE8E4; }
  .btn-disabled { background: #F2F0EC; color: #BDB8AC; pointer-events: none; }
  .lbl { font-family: Inter; font-size: 10px; color: var(--fg-muted); text-align: center; margin-top: 6px; }
</style>
</head>
<body>
  <div class="row" style="gap: 18px; align-items: flex-start;">
    <div class="col" style="gap: 0; align-items: center;">
      <button class="btn btn-primary">Plan week</button>
      <div class="lbl">primary</div>
    </div>
    <div class="col" style="gap: 0; align-items: center;">
      <button class="btn btn-secondary">Cancel</button>
      <div class="lbl">secondary</div>
    </div>
    <div class="col" style="gap: 0; align-items: center;">
      <button class="btn btn-ghost">Skip</button>
      <div class="lbl">ghost</div>
    </div>
    <div class="col" style="gap: 0; align-items: center;">
      <button class="btn btn-danger">Delete</button>
      <div class="lbl">danger</div>
    </div>
    <div class="col" style="gap: 0; align-items: center;">
      <button class="btn btn-disabled">Saving</button>
      <div class="lbl">disabled</div>
    </div>
  </div>
</body></html>
