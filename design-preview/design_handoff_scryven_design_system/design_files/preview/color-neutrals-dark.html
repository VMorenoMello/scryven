<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #16140F; color: #F2EFE8; }
  .swatch-meta { color: #8A8478; }
  .swatch-meta b { color: #F2EFE8; }
  .swatch { border-color: #36322B; }
</style></head>
<body>
  <div class="row" style="gap: 14px;">
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #16140F;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>bg</b>#16140F</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #1F1D17;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface</b>#1F1D17</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #2A2721;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface-2</b>#2A2721</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #36322B;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface-3</b>#36322B</div>
    </div>
    <div style="width: 1px; height: 64px; background: #36322B; margin: 0 4px;"></div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #F2EFE8;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>fg</b>#F2EFE8</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #C8C3B5;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>fg-2</b>#C8C3B5</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #8A8478;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>muted</b>#8A8478</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #5A5648;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>disabled</b>#5A5648</div>
    </div>
  </div>
</body></html>
