<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 18px; align-items: stretch;">

    <!-- Q1 White-gold -->
    <div class="col" style="gap: 8px;">
      <div style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2);">Q1 · White</div>
      <div class="q-stack" style="width: 200px;">
        <div style="background: #F5F0E8; color: #4A3F28;"><span>fill</span><span class="hex">#F5F0E8</span></div>
        <div style="background: #F5F0E8; color: #4A3F28; border-top: 1px solid #B8A882;"><span>border</span><span class="hex">#B8A882</span></div>
        <div style="background: #F5F0E8; color: #4A3F28;"><span>text</span><span class="hex">#4A3F28</span></div>
      </div>
    </div>

    <!-- Q2 Blue -->
    <div class="col" style="gap: 8px;">
      <div style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2);">Q2 · Blue</div>
      <div class="q-stack" style="width: 200px;">
        <div style="background: #E8F2FB; color: #1A3D5C;"><span>fill</span><span class="hex">#E8F2FB</span></div>
        <div style="background: #E8F2FB; color: #1A3D5C; border-top: 1px solid #4A7FB5;"><span>border</span><span class="hex">#4A7FB5</span></div>
        <div style="background: #E8F2FB; color: #1A3D5C;"><span>text</span><span class="hex">#1A3D5C</span></div>
      </div>
    </div>

    <!-- Q3 Red -->
    <div class="col" style="gap: 8px;">
      <div style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2);">Q3 · Red</div>
      <div class="q-stack" style="width: 200px;">
        <div style="background: #FBE8E4; color: #6B1F10;"><span>fill</span><span class="hex">#FBE8E4</span></div>
        <div style="background: #FBE8E4; color: #6B1F10; border-top: 1px solid #C4503A;"><span>border</span><span class="hex">#C4503A</span></div>
        <div style="background: #FBE8E4; color: #6B1F10;"><span>text</span><span class="hex">#6B1F10</span></div>
      </div>
    </div>

  </div>
</body></html>
