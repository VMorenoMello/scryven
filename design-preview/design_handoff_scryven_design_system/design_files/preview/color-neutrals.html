<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 14px;">
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #FAF9F7;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>bg</b>#FAF9F7</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #FFFFFF;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface</b>#FFFFFF</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #F2F0EC;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface-2</b>#F2F0EC</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #E8E5DF;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>surface-3</b>#E8E5DF</div>
    </div>
    <div style="width: 1px; height: 64px; background: var(--border-subtle); margin: 0 4px;"></div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #1F1D1A; border-color: #1F1D1A;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>fg</b>#1F1D1A</div>
    </div>

      <div class="swatch" style="background: #4A463F; border-color: #4A463F;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>fg-2</b>#4A463F</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #8A8478; border-color: #8A8478;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>muted</b>#8A8478</div>
    </div>
    <div class="col" style="gap: 6px; align-items: center;">
      <div class="swatch" style="background: #BDB8AC; border-color: #BDB8AC;"></div>
      <div class="swatch-meta" style="text-align:center;"><b>disabled</b>#BDB8AC</div>
    </div>
  </div>
