<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 18px; align-items: stretch;">

    <!-- Q4 Dark -->
    <div class="col" style="gap: 8px;">
      <div style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2);">Q4 · Black</div>
      <div class="q-stack" style="width: 200px; border-color: #6B5E4A;">
        <div style="background: #2A2825; color: #C8B896;"><span>fill</span><span class="hex">#2A2825</span></div>
        <div style="background: #2A2825; color: #C8B896; border-top: 1px solid #6B5E4A;"><span>border</span><span class="hex">#6B5E4A</span></div>
        <div style="background: #2A2825; color: #C8B896;"><span>text</span><span class="hex">#C8B896</span></div>
      </div>
    </div>

    <!-- Brand green -->
    <div class="col" style="gap: 8px;">
      <div style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-2);">Brand · Green</div>
      <div class="q-stack" style="width: 200px;">
        <div style="background: #E8F2E8; color: #1F4A1F;"><span>fill</span><span class="hex">#E8F2E8</span></div>
        <div style="background: #E8F2E8; color: #1F4A1F; border-top: 1px solid #4A8A4A;"><span>border</span><span class="hex">#4A8A4A</span></div>
        <div style="background: #E8F2E8; color: #1F4A1F;"><span>text</span><span class="hex">#1F4A1F</span></div>
      </div>
    </div>

    <!-- Caption explaining mapping -->
    <div style="max-width: 230px; padding-top: 24px;">
      <div class="text-caption" style="color: var(--fg-muted); line-height: 1.5;">
        Each quadrant ships as a <b style="color:var(--fg);font-weight:500;">fill / border / text</b> triplet. Borders only appear on hover or selection — surfaces are otherwise borderless within a card.
      </div>
    </div>

  </div>
</body></html>
