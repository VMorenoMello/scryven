<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 10px 0 8px;
    border-radius: 999px;
    border: 1px solid;
    font-family: Inter, sans-serif;
    font-size: 11px; font-weight: 500;
    line-height: 1;
  }
  .chip .glyph {
    font-family: Inter, sans-serif; font-weight: 500; font-size: 10px;
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid currentColor;
  }
</style>
</head>
<body>
  <div class="row" style="gap: 8px; align-items: center;">
    <span class="chip" style="background:#F5F0E8; color:#4A3F28; border-color:#B8A882;">
      <span class="glyph">W</span> Q1 · do now
    </span>
    <span class="chip" style="background:#E8F2FB; color:#1A3D5C; border-color:#4A7FB5;">
      <span class="glyph">U</span> Q2 · plan
    </span>
    <span class="chip" style="background:#FBE8E4; color:#6B1F10; border-color:#C4503A;">
      <span class="glyph">R</span> Q3 · delegate
    </span>
    <span class="chip" style="background:#2A2825; color:#C8B896; border-color:#6B5E4A;">
      <span class="glyph" style="background:#2A2825;">B</span> Q4 · drop
    </span>
    <span class="chip" style="background:#E8F2E8; color:#1F4A1F; border-color:#4A8A4A;">
      <span class="glyph">G</span> streak
    </span>
  </div>
  <div class="text-caption" style="margin-top: 12px; color: var(--fg-muted);">
    The MTG letter (W / U / R / B / G) is the only place we acknowledge the reference inside the product.
  </div>
</body></html>
