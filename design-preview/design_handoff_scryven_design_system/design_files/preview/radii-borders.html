<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 24px; align-items: flex-end;">
    <div class="col" style="gap: 8px; align-items: center;">
      <div style="width: 80px; height: 60px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 6px;"></div>
      <div class="text-caption"><b style="color:var(--fg);font-weight:500;display:block;">sm · 6px</b>chips, inputs</div>
    </div>
    <div class="col" style="gap: 8px; align-items: center;">
      <div style="width: 80px; height: 60px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 8px;"></div>
      <div class="text-caption"><b style="color:var(--fg);font-weight:500;display:block;">md · 8px</b>buttons, rows</div>
    </div>
    <div class="col" style="gap: 8px; align-items: center;">
      <div style="width: 80px; height: 60px; background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;"></div>
      <div class="text-caption"><b style="color:var(--fg);font-weight:500;display:block;">lg · 12px</b>cards, modals</div>
    </div>
    <div class="col" style="gap: 8px; align-items: center;">
      <div style="width: 80px; height: 60px; background: var(--green-fill); border: 1px solid var(--green); border-radius: 999px;"></div>
      <div class="text-caption"><b style="color:var(--fg);font-weight:500;display:block;">pill · 999px</b>chips, dots only</div>
    </div>
    <div style="max-width: 200px; padding-left: 8px;">
      <div class="text-caption" style="color: var(--fg-muted); line-height: 1.5;">Borders are <b style="color:var(--fg);font-weight:500;">always 1px solid</b>. No shadows in the system — surfaces lift via hue, not blur.</div>
    </div>
  </div>
</body></html>
